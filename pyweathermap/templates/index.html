<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>pyweathermap</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 32px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    .toggle {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .toggle label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
    }
    form {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    h1 { font-size: 1.3rem; color: #e94560; margin-bottom: 20px; }
    select, button {
      font-size: 1rem;
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #0f3460;
    }
    select {
      background: #1a1a2e;
      color: #eee;
      min-width: 220px;
      margin-right: 8px;
    }
    button {
      background: #e94560;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #d63a52; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Network Weathermap</h1>
    <div class="toggle">
      <label><input type="radio" name="display_mode" value="name" checked> Name</label>
      <label><input type="radio" name="display_mode" value="ip"> IP</label>
    </div>
    <form action="/goto" method="get">
      <select name="switch" id="switch-select">
        {% for name, ip in switches %}
        <option value="{{ name }}" data-name="{{ name }}" data-ip="{{ ip }}">{{ name }}</option>
        {% endfor %}
      </select>
      <button type="submit">View Map</button>
    </form>
<script>
  document.querySelectorAll('input[name="display_mode"]').forEach(radio => {
    radio.addEventListener('change', e => {
      const mode = e.target.value;
      document.querySelectorAll('#switch-select option').forEach(opt => {
        const val = mode === 'ip' ? opt.dataset.ip : opt.dataset.name;
        opt.value = val;
        opt.textContent = val;
      });
    });
  });
</script>

  </div>
  {% include "toast.html" %}
</body>
</html>
